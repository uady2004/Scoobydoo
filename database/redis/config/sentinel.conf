# =============================================================================
# Redis Sentinel Configuration — TikTok Clone
#
# Purpose  : High-availability automatic failover for the Redis primary.
# Topology : 3 Sentinel nodes provide quorum=2 majority failover consensus.
# Deploy   : One sentinel.conf per Sentinel instance. Copy this file to each
#            Sentinel host and override the bind / announce-ip per node.
#
# Node assignments:
#   Sentinel 1  10.0.1.11:26379  (shares host with Replica 1)
#   Sentinel 2  10.0.1.12:26379  (shares host with Replica 2)
#   Sentinel 3  10.0.1.13:26379  (dedicated Sentinel-only VM)
#
#   Redis Primary   10.0.1.10:6379
#   Redis Replica 1 10.0.1.11:6379
#   Redis Replica 2 10.0.1.12:6379
#
# Quick-reference commands (run from any Sentinel node):
#   Get current primary:
#     redis-cli -p 26379 -a $SENTINEL_PASSWORD SENTINEL get-master-addr-by-name tiktok-primary
#   Force manual failover (e.g. for maintenance):
#     redis-cli -p 26379 -a $SENTINEL_PASSWORD SENTINEL failover tiktok-primary
#   Check replica status:
#     redis-cli -p 26379 -a $SENTINEL_PASSWORD SENTINEL replicas tiktok-primary
#   Monitor failover events:
#     redis-cli -p 26379 -a $SENTINEL_PASSWORD SUBSCRIBE +failover-end +switch-master
# =============================================================================


# -----------------------------------------------------------------------------
# NETWORK
# -----------------------------------------------------------------------------

# Standard Sentinel port.
port 26379

# Bind to the private interface of this node.
# Override per host: Node 1 = 10.0.1.11, Node 2 = 10.0.1.12, Node 3 = 10.0.1.13
bind 127.0.0.1 10.0.1.11

# Refuse connections from non-loopback addresses when no auth is configured.
protected-mode yes

# Sentinel TLS — enable when Sentinels communicate over untrusted networks.
# tls-port 26380
# tls-cert-file     /etc/redis/tls/sentinel.crt
# tls-key-file      /etc/redis/tls/sentinel.key
# tls-ca-cert-file  /etc/redis/tls/ca.crt
# tls-replication   yes
# tls-auth-clients  yes


# -----------------------------------------------------------------------------
# GENERAL
# -----------------------------------------------------------------------------

daemonize no
pidfile /var/run/redis/redis-sentinel.pid
logfile /var/log/redis/sentinel.log
loglevel notice

# Working directory for Sentinel state files (sentinel rewrites this file on failover).
dir /var/lib/redis-sentinel


# -----------------------------------------------------------------------------
# SECURITY
# -----------------------------------------------------------------------------

# Password required to connect to this Sentinel instance.
requirepass "${SENTINEL_PASSWORD}"

# Password used by Sentinel to authenticate against the monitored primary and replicas.
sentinel auth-pass tiktok-primary "${REDIS_PASSWORD}"

# ACL file for Sentinel clients (Redis 7+ — allows per-service Sentinel credentials).
# aclfile /etc/redis/acl/sentinel-users.acl


# -----------------------------------------------------------------------------
# MONITORED PRIMARY
# -----------------------------------------------------------------------------

# sentinel monitor <name> <host> <port> <quorum>
#
# quorum = number of Sentinels that must independently agree the primary is
# unreachable before a failover is initiated. With 3 Sentinels, quorum=2
# prevents a single flapping Sentinel from triggering spurious failovers.
sentinel monitor tiktok-primary 10.0.1.10 6379 2

# Milliseconds without a response before Sentinel considers a node subjectively down.
# 5 000 ms = tolerate up to ~3 lost heartbeats (default ping interval = 1 000 ms).
sentinel down-after-milliseconds tiktok-primary 5000

# Maximum milliseconds allowed for a failover to complete end-to-end.
# Formula: (replica-count + 1) × repl-timeout-seconds × 1000
# = (2 + 1) × 60 × 1000 = 180 000 ms. Add buffer → 60 000 ms for fast networks.
sentinel failover-timeout tiktok-primary 60000

# Number of replicas that can be reconfigured concurrently during failover.
# 1 ensures at least one replica remains readable while reconfiguring the other.
sentinel parallel-syncs tiktok-primary 1

# Deny script reconfiguration to prevent remote code execution via Sentinel hooks.
sentinel deny-scripts-reconfig yes


# -----------------------------------------------------------------------------
# ANNOUNCEMENT (NAT / Docker / Kubernetes overrides)
# -----------------------------------------------------------------------------

# When Sentinel runs behind NAT, in Docker, or in Kubernetes with ClusterIP
# services, it must announce its external address so other Sentinels and
# application clients can reach it.
#
# Override these per-node via environment variables or a wrapper entrypoint script:
#   NODE 1: sentinel announce-ip 10.0.1.11
#   NODE 2: sentinel announce-ip 10.0.1.12
#   NODE 3: sentinel announce-ip 10.0.1.13
#
# sentinel announce-ip   10.0.1.11
# sentinel announce-port 26379


# -----------------------------------------------------------------------------
# NOTIFICATION HOOKS
# -----------------------------------------------------------------------------

# Script executed on any Sentinel event (e.g. +sdown, +odown, +failover-end).
# Receives: <event-type> <event-description>
# Use to page on-call engineers via PagerDuty, Opsgenie, or Slack.
sentinel notification-script tiktok-primary /etc/redis/scripts/sentinel-notify.sh

# Script executed when a client needs to be told the primary has changed.
# Receives: <master-name> <role> <state> <from-ip> <from-port> <to-ip> <to-port>
# Use to update service-discovery (Consul, etcd) or push config to app servers.
sentinel client-reconfig-script tiktok-primary /etc/redis/scripts/sentinel-reconfig.sh


# -----------------------------------------------------------------------------
# ADVANCED TIMING
# -----------------------------------------------------------------------------

# How often (ms) Sentinel sends PING to other Sentinels and Redis instances.
# Default = 1 000 ms. Lowering to 500 ms halves detection time at the cost of
# ~2× network overhead. Adjust alongside down-after-milliseconds.
# sentinel monitor-interval 1000

# After a successful failover, Sentinel will not trigger another failover for
# the same master within failover-timeout * 2 ms. This prevents failover storms
# after a newly elected primary is temporarily slow to accept writes.

# Minimum number of reachable Sentinel instances required to trigger a failover.
# Implicit: quorum already enforces this for objectivedown detection.


# =============================================================================
# OPERATIONAL NOTES
# =============================================================================
#
# 1. IMPORTANT: Sentinel auto-rewrites this file on every topology change
#    (failover, replica discovery). Keep the file writable by the sentinel process
#    and do NOT manage it with a config-management tool that overwrites on deploy.
#
# 2. Replication configuration for each Redis replica (add to redis.conf):
#      replicaof 10.0.1.10 6379
#      masterauth "${REDIS_PASSWORD}"
#      replica-announce-ip   10.0.1.1X    # this replica's own IP
#      replica-announce-port 6379
#
# 3. Application client configuration (go-redis failover options):
#      MasterName:    "tiktok-primary"
#      SentinelAddrs: ["10.0.1.11:26379","10.0.1.12:26379","10.0.1.13:26379"]
#      SentinelPassword: <SENTINEL_PASSWORD>
#      Password:         <REDIS_PASSWORD>
#
# 4. Sentinel quorum math:
#      3 Sentinels, quorum=2  → tolerates 1 Sentinel failure
#      5 Sentinels, quorum=3  → tolerates 2 Sentinel failures (for global deployments)
#
# 5. Monitoring: track these Sentinel metrics in Prometheus/Grafana:
#      redis_sentinel_masters           — should always be 1
#      redis_sentinel_ok_slaves         — should be ≥ 1
#      redis_sentinel_ok_sentinels      — should be 3
#      redis_sentinel_ckquorum_status   — should be 1 (quorum reachable)
#
# =============================================================================
