# =============================================================================
# Redis 7.x Production Configuration — TikTok Clone
#
# Instance role : Primary (read-replica and Sentinel configs are separate files)
# Hardware target: 16-core VM, 32 GB RAM, NVMe SSD
# Tuned for     : 8 GB maxmemory, allkeys-LRU eviction, AOF+RDB hybrid
#                 persistence, 2 synchronous read-replicas, high-throughput
#                 mixed workload (sorted sets, strings, hashes, pub/sub)
#
# Deployment topology:
#   Primary     10.0.1.10:6379
#   Replica 1   10.0.1.11:6379
#   Replica 2   10.0.1.12:6379
#   Sentinel 1  10.0.1.11:26379
#   Sentinel 2  10.0.1.12:26379
#   Sentinel 3  10.0.1.13:26379
# =============================================================================


# -----------------------------------------------------------------------------
# NETWORK
# -----------------------------------------------------------------------------

# Bind only on the private management interface. Never expose Redis to the
# public internet. Add 127.0.0.1 for same-host app servers.
bind 127.0.0.1 10.0.1.10

# Standard Redis port.
port 6379

# Unix domain socket — lower latency for co-located application processes.
unixsocket /var/run/redis/redis.sock
unixsocketperm 770

# TCP listen backlog — match /proc/sys/net/core/somaxconn (typically 511).
tcp-backlog 511

# Close idle client connections after 300 s. 0 = never (not recommended).
timeout 300

# TCP keepalive: detect dead peers after 60 s of silence.
tcp-keepalive 60

# Maximum simultaneous client connections.
# 20 000 supports ~200 app-server instances × 100 connections each.
maxclients 20000


# -----------------------------------------------------------------------------
# TLS (terminate TLS at Redis when not using a proxy or stunnel)
# -----------------------------------------------------------------------------
# Uncomment and configure to enable encrypted client-server communication.

# tls-port 6380
# tls-cert-file     /etc/redis/tls/redis.crt
# tls-key-file      /etc/redis/tls/redis.key
# tls-ca-cert-file  /etc/redis/tls/ca.crt
# tls-auth-clients  yes
# tls-protocols     "TLSv1.2 TLSv1.3"
# tls-ciphers       TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
# tls-replication   yes


# -----------------------------------------------------------------------------
# GENERAL
# -----------------------------------------------------------------------------

# Do not daemonize — let systemd manage the process lifecycle.
# Set to yes only when running without a process supervisor.
daemonize no

pidfile /var/run/redis/redis.pid

# notice level is appropriate for production. verbose adds latency overhead.
loglevel notice
logfile /var/log/redis/redis.log

# 8 databases (DB 0 = main, DB 1-3 = staging/test, DB 4-7 = reserved).
# Fewer databases reduce overhead; logical separation uses key prefixes.
databases 8

always-show-logo no

set-proc-title yes
proc-title-template "{title} {server-mode} {listen-addr} {server-version}"


# -----------------------------------------------------------------------------
# SECURITY
# -----------------------------------------------------------------------------

# Require authentication. Use a strong randomly-generated password (≥64 chars).
# Populate via environment variable — never hard-code credentials.
requirepass "${REDIS_PASSWORD}"

# ACL file for fine-grained per-service access control (Redis 6+).
# Each service gets its own ACL user with only the commands it needs.
# Example entries:
#   user feed-service  on >feedpass  ~feed:*  ~foryou_feed:*  +get +set +zadd +zrange +zrangebyscore +zrem +del
#   user rate-limiter  on >rlpass    ~rl:*    +zadd +zrangebyscore +zremrangebyscore +zcard +pexpire +eval +evalsha
#   user session-svc   on >sesspass  ~session:* ~user_sessions:* ~revoked_tokens +get +set +del +sadd +srem +smembers +zadd +zrem +zscore +mget
aclfile /etc/redis/acl/users.acl
acllog-max-len 128

# Rename dangerous commands to unpredictable tokens to prevent accidental
# or malicious execution. Tokens are injected at deploy time via environment
# variables or a secrets manager.
rename-command FLUSHDB   ""
rename-command FLUSHALL  ""
rename-command DEBUG     ""
rename-command CONFIG    "${REDIS_CONFIG_CMD}"
rename-command KEYS      "${REDIS_KEYS_CMD}"
rename-command SHUTDOWN  "${REDIS_SHUTDOWN_CMD}"
rename-command BGREWRITEAOF "${REDIS_BGREWRITEAOF_CMD}"

# Refuse connections from non-loopback addresses when no password is set.
protected-mode yes


# -----------------------------------------------------------------------------
# MEMORY
# -----------------------------------------------------------------------------

# Hard limit — Redis will evict keys when this is reached.
# Set to 75 % of available RAM to leave headroom for the OS and replication
# buffers: 8 GB on a 32 GB node leaves 24 GB for the OS and other processes.
maxmemory 8gb

# Eviction policy:
#   allkeys-lru  — evict any key using LRU approximation.
#                  Best for pure caching workloads where all data can be rebuilt.
#
# If some keys (e.g. alltime leaderboards) must never be evicted, switch to:
#   volatile-lru — only evict keys that have a TTL set.
# and ensure critical keys have no TTL.
maxmemory-policy allkeys-lru

# Keys sampled per eviction step. Higher = better LRU accuracy, more CPU.
# 10 is a good balance for production (default is 5).
maxmemory-samples 10

# Perform evictions and expired-key deletions in background threads to
# prevent the event loop from stalling on large-key deletions.
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
lazyfree-lazy-user-del yes
lazyfree-lazy-user-flush yes
replica-lazy-flush yes

# Active memory defragmentation — reclaim memory fragmented by jemalloc.
# Enable once memory fragmentation ratio exceeds ~1.3 in production.
activedefrag yes
active-defrag-ignore-bytes 200mb
active-defrag-threshold-lower 10
active-defrag-threshold-upper 100
active-defrag-cycle-min 1
active-defrag-cycle-max 25
active-defrag-max-scan-fields 1000


# -----------------------------------------------------------------------------
# THREADING (Redis 6+ threaded I/O)
# -----------------------------------------------------------------------------

# Offload network I/O parsing to threads. Set to (CPU cores / 2) - 1.
# On a 16-core host: (16/2) - 1 = 7. Do NOT exceed physical core count.
io-threads 4
io-threads-do-reads yes


# -----------------------------------------------------------------------------
# PERSISTENCE — RDB (point-in-time snapshots)
# -----------------------------------------------------------------------------

# RDB provides a compact recovery baseline. AOF provides per-second durability.
# Together they enable fast restart (load RDB, then replay the short AOF tail).
#
# Format: save <seconds> <min-changes>
# At least 1 change in the last hour.
save 3600 1
# At least 100 changes in the last 5 minutes.
save 300 100
# At least 10 000 changes in the last 60 seconds.
save 60 10000

# Abort accepting writes when a background save fails (surfaces I/O issues).
stop-writes-on-bgsave-error yes

# Compress RDB file contents with LZF. Small CPU overhead, ~30 % space saving.
rdbcompression yes
rdbchecksum yes

dbfilename dump.rdb
dir /var/lib/redis

# Spread fsync I/O during BGSAVE across the whole save duration.
rdb-save-incremental-fsync yes


# -----------------------------------------------------------------------------
# PERSISTENCE — AOF (append-only file)
# -----------------------------------------------------------------------------

appendonly yes
appendfilename "appendonly.aof"
# Redis 7 multi-part AOF: each file segment lives in this subdirectory.
appenddirname "appendonlydir"

# fsync policy:
#   everysec — fsync once per second; recommended. At most ~1 s of data loss.
#   always   — fsync after every command; safest but ~10× write latency.
#   no       — OS decides; fastest, multi-second data-loss window.
appendfsync everysec

# Suspend fsync during BGSAVE / BGREWRITEAOF to avoid I/O saturation on NVMe.
# Potential data loss of one rewrite interval (~1 s) if the host crashes mid-rewrite.
no-appendfsync-on-rewrite yes

# Trigger an AOF rewrite when the AOF file has grown by 100 % since the last
# rewrite, but only when the file exceeds 512 MB.
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 512mb

# RDB-AOF hybrid format (Redis 7): loads the RDB preamble for fast startup,
# then replays only the AOF tail for the most recent writes.
aof-use-rdb-preamble yes

# Spread fsync I/O during AOF rewrite to avoid latency spikes.
aof-rewrite-incremental-fsync yes

# Tolerate a truncated AOF on restart (e.g. after power loss mid-write).
# Set to no in environments where partial writes must cause a hard failure.
aof-load-truncated yes


# -----------------------------------------------------------------------------
# REPLICATION
# -----------------------------------------------------------------------------

# Authenticate replicas with the primary password.
masterauth "${REDIS_PASSWORD}"

# Serve stale (possibly out-of-date) data while a replica re-synchronises.
# Better than returning errors during a brief re-sync window.
replica-serve-stale-data yes

# Replicas accept only read commands.
replica-read-only yes

# Diskless replication: stream the RDB snapshot directly to replica sockets
# instead of writing to a temporary file first. Faster on fast networks.
repl-diskless-sync yes
# Wait 5 s for additional replicas to connect before starting the transfer.
repl-diskless-sync-delay 5
# 0 = no limit; wait for all connected replicas.
repl-diskless-sync-max-replicas 0

# Heartbeat between primary and replica.
repl-ping-replica-period 10
repl-timeout 60

# Replication backlog: how much write data to buffer for partial re-sync after
# a brief replica disconnect. 256 MB handles ~5 min of peak write load.
repl-backlog-size 256mb
# Discard the backlog after this many seconds with no connected replica.
repl-backlog-ttl 3600

# Output buffer limits for replica connections. Drop replicas that fall >512 MB
# behind or stay >128 MB behind for more than 60 s.
client-output-buffer-limit replica 512mb 128mb 60

# Require at least 1 replica to acknowledge a write before accepting it.
# Prevents data loss in a split-brain scenario. Adds ~1 RTT of latency.
min-replicas-to-write 1
min-replicas-max-lag 10


# -----------------------------------------------------------------------------
# CLUSTER (disabled — Sentinel is used for HA in this deployment)
# -----------------------------------------------------------------------------

cluster-enabled no


# -----------------------------------------------------------------------------
# LUA SCRIPTING
# -----------------------------------------------------------------------------

# Log a slow-script warning when a Lua script runs longer than 5 s.
# In production, all scripts should complete in < 1 ms; this is a safety net.
lua-time-limit 5000

# Never enable lua-debug in production — it introduces global state mutations.
# lua-debug-enabled yes


# -----------------------------------------------------------------------------
# SLOW LOG
# -----------------------------------------------------------------------------

# Log commands slower than 10 ms (10 000 µs). Alert if p99 > 1 ms.
slowlog-log-slower-than 10000
# Keep the 512 most recent slow-log entries in memory.
slowlog-max-len 512


# -----------------------------------------------------------------------------
# LATENCY MONITORING
# -----------------------------------------------------------------------------

# Log latency events > 50 ms.
latency-monitor-threshold 50
latency-tracking yes
latency-tracking-info-percentiles 50 99 99.9


# -----------------------------------------------------------------------------
# KEYSPACE NOTIFICATIONS (event-driven consumers)
# -----------------------------------------------------------------------------

# Enable notifications for:
#   K = keyspace events (per key)
#   E = keyevent events (per event type)
#   x = expired events   → consumed by session cleanup workers
#   g = generic commands (DEL, EXPIRE, RENAME, …)
#   z = sorted-set commands → consumed by leaderboard streak watchers
#
# WARNING: enabling notifications increases CPU ~5–10 % under high write load.
# Disable event types not consumed by any live service.
notify-keyspace-events "KExg"


# -----------------------------------------------------------------------------
# DATA STRUCTURE MEMORY OPTIMISATION
# -----------------------------------------------------------------------------

# Hash: use listpack (formerly ziplist) encoding for small hashes.
# Sorted sets, hashes, and lists stored as feed metadata fit under these limits.
hash-max-listpack-entries 128
hash-max-listpack-value 64

# List: listpack for small lists; compress intermediate nodes.
list-max-listpack-size -2    # Each listpack node ≤ 8 kb
list-compress-depth 1        # Compress all but head and tail

# Set: intset for sets that contain only integers.
set-max-intset-entries 512
set-max-listpack-entries 128
set-max-listpack-value 64

# Sorted set: listpack encoding for small sorted sets.
# Feed pages (20 items) and typing indicators (< 10 users) stay in listpack.
zset-max-listpack-entries 128
zset-max-listpack-value 64

# Active expired-key scanning to reclaim TTL'd memory promptly.
active-expire-enabled yes
# Effort 1–10 (default 1). Higher = more CPU spent on expired key cleanup.
active-expire-effort 2


# -----------------------------------------------------------------------------
# CLIENT OUTPUT BUFFERS
# -----------------------------------------------------------------------------

# Normal clients: unlimited output buffer (rely on maxclients + timeout).
client-output-buffer-limit normal 0 0 0
# Pub/sub subscribers: hard limit 32 MB, soft limit 8 MB for 60 s.
client-output-buffer-limit pubsub 32mb 8mb 60

# Maximum incoming request size per client (guards against malformed large payloads).
client-query-buffer-limit 512mb


# -----------------------------------------------------------------------------
# MODULES (load optional Redis modules as needed)
# -----------------------------------------------------------------------------

# loadmodule /usr/lib/redis/modules/redisearch.so    # full-text search
# loadmodule /usr/lib/redis/modules/redisjson.so     # JSON document storage
# loadmodule /usr/lib/redis/modules/redistimeseries.so  # time-series metrics


# -----------------------------------------------------------------------------
# CRASH DIAGNOSTICS
# -----------------------------------------------------------------------------

crash-log-enabled yes
crash-memlog-enabled yes
use-exit-on-panic no
# Suppress the Transparent Huge Pages warning (disable THP at the OS level instead).
disable-thp-warning no


# =============================================================================
# REPLICA CONFIGURATION ADDENDUM
# (Add the following lines to redis.conf on each replica node; omit on primary)
# =============================================================================
#
# replicaof 10.0.1.10 6379
# masterauth "${REDIS_PASSWORD}"
# replica-announce-ip   10.0.1.11   # this replica's own IP
# replica-announce-port 6379
#
# =============================================================================
# END OF CONFIGURATION
# =============================================================================
